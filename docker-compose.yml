# Development docker-compose.
# Builds the image locally and mounts source for hot-reload.
#
# Quick start:
#   cp .env.example .env   # fill in DJANGO_SECRET_KEY and POSTGRES_PASSWORD
#   docker compose up --build
#   docker compose run --rm web uv run python manage.py migrate

services:

  db:
    image: postgres:15
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build: .
    command: uv run python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      DB_HOST: db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
