name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: sputnik
          POSTGRES_USER: sputnik
          POSTGRES_PASSWORD: sputnik
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run pytest
        env:
          DJANGO_SECRET_KEY: ci-secret-key
          ALLOWED_HOSTS: localhost
          POSTGRES_DB: sputnik
          POSTGRES_USER: sputnik
          POSTGRES_PASSWORD: sputnik
