# Production docker-compose.
# Uses pre-built image from registry (built via: make build-push)
#
# Quick start:
#   cp .env.example .env
#   cp sputnik.env.example sputnik.env
#   docker compose up -d

services:

  sputnik_migrate:
    image: ${SPUTNIK_IMAGE:?SPUTNIK_IMAGE is required, e.g. registry.lab.tk-sputnik.org/sputnik:latest}
    container_name: sputnik_migrate
    command:
      - /bin/sh
      - -c
      - |
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput
    env_file:
      - ./sputnik.env
    volumes:
      - ${DATA_LOCATION}/static:/app/staticfiles
    depends_on:
      sputnik_db:
        condition: service_healthy
    networks:
      - sputnik_default
    restart: "no"

  sputnik_web:
    image: ${SPUTNIK_IMAGE:?SPUTNIK_IMAGE is required, e.g. registry.lab.tk-sputnik.org/sputnik:latest}
    container_name: sputnik_django
    restart: unless-stopped
    command: ["uv", "run", "gunicorn", "--bind", "0.0.0.0:8000", "config.wsgi:application", "--access-logfile", "-", "--log-level", "info"]
    env_file:
      - ./sputnik.env
    volumes:
      - ${DATA_LOCATION}/media:/app/media
    depends_on:
      sputnik_migrate:
        condition: service_completed_successfully
    networks:
      - sputnik_default

  sputnik_nginx:
    image: nginx:alpine
    container_name: sputnik_nginx
    restart: unless-stopped
    volumes:
      - ${DATA_LOCATION}/static:/app/staticfiles:ro
      - ${DATA_LOCATION}/media:/app/media:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      sputnik_migrate:
        condition: service_completed_successfully
    networks:
      - proxy
      - sputnik_default

  sputnik_db:
    image: postgres:15
    container_name: sputnik_db
    restart: unless-stopped
    env_file:
      - ./sputnik.env
    volumes:
      - ${DATA_LOCATION}/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - sputnik_default

networks:
  sputnik_default:
  proxy:
    external: true
