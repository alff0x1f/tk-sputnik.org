{% extends "demo/base.html" %}
{% load static %}

{% block title %}Проверка — Челлендж — Турклуб Спутник{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'challenge/css/challenge.css' %}">
<style>
.review-wrap {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 56px);
  overflow: hidden;
}

.review-toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--line);
  background: var(--surface);
  flex-shrink: 0;
  flex-wrap: wrap;
}

.review-nav {
  display: flex;
  align-items: center;
  gap: 6px;
}

.review-nav button {
  padding: 4px 10px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface-2);
  cursor: pointer;
  font-size: 14px;
  color: var(--ink);
}

.review-nav button:hover {
  background: var(--surface);
  border-color: var(--accent);
}

.review-counter {
  font-size: 13px;
  color: var(--muted);
  min-width: 80px;
  text-align: center;
}

.review-filters {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: auto;
  flex-wrap: wrap;
}

.review-filters select,
.review-filters button {
  padding: 4px 10px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface-2);
  font-size: 13px;
  color: var(--ink);
  cursor: pointer;
}

.review-filters select:focus,
.review-filters button:focus {
  outline: 2px solid var(--accent);
  outline-offset: 1px;
}

.filter-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

.review-panels {
  display: flex;
  flex: 1;
  overflow: hidden;
}

.review-left,
.review-right {
  overflow-y: auto;
  padding: 16px;
}

.review-left {
  flex: 1;
  border-right: 1px solid var(--line);
  background: var(--surface-2);
}

.review-right {
  width: 340px;
  flex-shrink: 0;
  background: var(--surface);
}

.review-photos {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 12px;
}

.review-photo {
  max-width: 100%;
  border-radius: var(--radius);
  border: 1px solid var(--line);
  display: block;
}

.review-meta {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 8px;
}

.review-text {
  font-size: 14px;
  color: var(--ink);
  white-space: pre-wrap;
  line-height: 1.5;
}

.review-no-photo {
  font-size: 13px;
  color: var(--muted);
  font-style: italic;
  padding: 12px 0;
}

.review-section-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 10px;
}

.workout-list-readonly {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.workout-item-ro {
  padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface-2);
  font-size: 13px;
}

.workout-item-ro .wi-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px;
}

.workout-item-ro .wi-activity {
  font-weight: 600;
  color: var(--ink);
}

.workout-item-ro .wi-pts {
  font-weight: 700;
  color: var(--accent);
}

.workout-item-ro .wi-details {
  color: var(--muted);
}

.review-no-workouts {
  font-size: 13px;
  color: var(--muted);
  font-style: italic;
}

.review-empty {
  padding: 40px;
  text-align: center;
  color: var(--muted);
}
</style>
{% endblock %}

{% block content %}
<div class="review-wrap">
  <div class="review-toolbar">
    <div class="review-nav">
      <button id="btn-prev" onclick="navigateCard(-1)">&#8592; Пред</button>
      <span class="review-counter" id="card-counter">—</span>
      <button id="btn-next" onclick="navigateCard(1)">След &#8594;</button>
    </div>

    <div class="review-filters">
      <select id="user-filter" onchange="applyFilters()">
        <option value="">Все участники</option>
      </select>
      <button class="filter-btn active" data-status="all" onclick="setStatusFilter('all', this)">Все</button>
      <button class="filter-btn" data-status="has_workout" onclick="setStatusFilter('has_workout', this)">С тренировкой</button>
      <button class="filter-btn" data-status="no_workout" onclick="setStatusFilter('no_workout', this)">Без тренировки</button>
    </div>
  </div>

  <div class="review-panels">
    <div class="review-left" id="left-panel">
      <div class="review-empty" id="empty-msg" style="display:none">Нет сообщений</div>
      <div id="photo-gallery" class="review-photos"></div>
      <div class="review-meta" id="msg-meta"></div>
      <div class="review-text" id="msg-text"></div>
    </div>

    <div class="review-right" id="right-panel">
      <div class="review-section-title">Тренировки</div>
      <div class="workout-list-readonly" id="workout-list"></div>
    </div>
  </div>
</div>

<script>
const CARDS = {{ cards_json|safe }};
let filteredCards = [];
let currentIndex = 0;
let statusFilter = 'all';

function buildUserFilter() {
  const names = new Set(CARDS.map(c => c.from_name));
  const sel = document.getElementById('user-filter');
  names.forEach(name => {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    sel.appendChild(opt);
  });
}

function applyFilters() {
  const user = document.getElementById('user-filter').value;
  filteredCards = CARDS.filter(c => {
    if (user && c.from_name !== user) return false;
    if (statusFilter === 'has_workout') return c.workouts.length > 0;
    if (statusFilter === 'no_workout') return c.workouts.length === 0;
    return true;
  });
  if (currentIndex >= filteredCards.length) currentIndex = 0;
  renderCard();
}

function setStatusFilter(status, btn) {
  statusFilter = status;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function navigateCard(delta) {
  if (!filteredCards.length) return;
  currentIndex = (currentIndex + delta + filteredCards.length) % filteredCards.length;
  renderCard();
}

function renderCard() {
  const counter = document.getElementById('card-counter');
  if (!filteredCards.length) {
    counter.textContent = '0 / 0';
    document.getElementById('photo-gallery').innerHTML = '';
    document.getElementById('msg-meta').textContent = '';
    document.getElementById('msg-text').textContent = '';
    document.getElementById('workout-list').innerHTML = '<p class="review-no-workouts">Нет сообщений</p>';
    return;
  }

  const card = filteredCards[currentIndex];
  counter.textContent = (currentIndex + 1) + ' / ' + filteredCards.length;

  const gallery = document.getElementById('photo-gallery');
  gallery.innerHTML = '';
  if (card.photos && card.photos.length) {
    card.photos.forEach(p => {
      const img = document.createElement('img');
      img.src = '/challenge/photo/' + p;
      img.className = 'review-photo';
      img.alt = 'Фото';
      gallery.appendChild(img);
    });
  } else {
    gallery.innerHTML = '<div class="review-no-photo">Нет фото</div>';
  }

  document.getElementById('msg-meta').textContent =
    card.from_name + ' · ' + card.date + ' · #' + card.msg_id;
  document.getElementById('msg-text').textContent = card.text || '';

  const list = document.getElementById('workout-list');
  list.innerHTML = '';
  if (!card.workouts.length) {
    list.innerHTML = '<p class="review-no-workouts">Нет тренировок</p>';
  } else {
    card.workouts.forEach(w => {
      const div = document.createElement('div');
      div.className = 'workout-item-ro';
      let details = '';
      if (w.distance_km != null) details += w.distance_km.toFixed(1) + ' км';
      if (w.pace_min_per_km != null) details += (details ? ' · ' : '') + w.pace_min_per_km.toFixed(1) + ' мин/км';
      const pts = w.base_points + (w.streak_bonus ? '+' + w.streak_bonus : '');
      div.innerHTML =
        '<div class="wi-header">' +
          '<span class="wi-activity">' + w.activity_display + '</span>' +
          '<span class="wi-pts">' + pts + ' очк.</span>' +
        '</div>' +
        '<div class="wi-details">' + w.athlete_name + ' · ' + w.date + (details ? ' · ' + details : '') + '</div>';
      list.appendChild(div);
    });
  }

  history.replaceState(null, '', '?msg=' + card.msg_id);
}

function jumpToMsg(msgId) {
  const idx = filteredCards.findIndex(c => c.msg_id === msgId);
  if (idx !== -1) currentIndex = idx;
}

buildUserFilter();
applyFilters();

const params = new URLSearchParams(location.search);
const msgParam = params.get('msg');
if (msgParam) jumpToMsg(parseInt(msgParam, 10));
renderCard();
</script>
{% endblock %}
